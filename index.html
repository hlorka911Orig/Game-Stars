<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Game Stars</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>💎 Game Stars</h1>
<div>
    Деньги: <span id="money">0</span> | Опыт: <span id="xp">0</span> | Ходы: <span id="moves">0</span>
</div>

<div id="grid"></div>

<button id="takeNow">Забрать сейчас</button>

<div id="shop"></div>

<div>
    <select id="potionSelect">
        <option value="row">Зелье ряд (0)</option>
        <option value="bomb">Царь-бомба (0)</option>
        <option value="cake">Тортик (0)</option>
        <option value="runner">Бегун (0)</option>
    </select>
    <button id="usePotion">Использовать зелье</button>
</div>

<script src="game.js"></script>
</body>
</html>
